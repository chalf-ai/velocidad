name: Deploy Velocidad Comercial a AWS ECS

# App INDEPENDIENTE (carpeta velocidad-comercial/) → su propio servicio ECS.
# OJO: la app aún NO tiene login. El servicio es público — deploy de PRUEBA.
# Antes de uso real con datos de clientes: agregar auth (NextAuth) y quitar la
# rama de prueba de los triggers de abajo.

on:
  push:
    branches: [main, feature/velocidad-comercial-app-separada]
    paths:
      - "velocidad-comercial/**"
      - ".github/workflows/deploy-comercial.yml"
  workflow_dispatch: # permite disparar manualmente desde GitHub

env:
  AWS_REGION: sa-east-1
  ECR_REPO: 145175805451.dkr.ecr.sa-east-1.amazonaws.com/velocidad-comercial
  ECS_CLUSTER: velocidad-ecs
  ECS_SERVICE: velocidad-comercial-svc
  CONTAINER_NAME: velocidad-comercial
  TASK_FAMILY: velocidad-comercial

jobs:
  deploy:
    name: Build & Deploy Comercial
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login a ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag y push imagen Docker (carpeta velocidad-comercial)
        id: build-image
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            --platform linux/amd64 \
            -t $ECR_REPO:$IMAGE_TAG \
            -t $ECR_REPO:latest \
            ./velocidad-comercial
          docker push $ECR_REPO:$IMAGE_TAG
          docker push $ECR_REPO:latest
          echo "image=$ECR_REPO:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Obtener task definition actual
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ env.TASK_FAMILY }} \
            --query taskDefinition \
            --output json > task-def.json

      - name: Actualizar imagen en task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-def.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.build-image.outputs.image }}

      - name: Deploy en ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: ✅ Deploy completado
        run: echo "Comercial desplegado - imagen ${{ github.sha }} en ${{ env.ECS_SERVICE }}"
