name: Deploy a AWS ECS

on:
  push:
    branches: [main]
  workflow_dispatch: # permite disparar manualmente desde GitHub

env:
  AWS_REGION: sa-east-1
  ECR_REPO: 145175805451.dkr.ecr.sa-east-1.amazonaws.com/velocidad
  ECS_CLUSTER: velocidad-ecs
  ECS_SERVICE: velocidad-svc
  CONTAINER_NAME: velocidad

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login a ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag y push imagen Docker
        id: build-image
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            --platform linux/amd64 \
            -t $ECR_REPO:$IMAGE_TAG \
            -t $ECR_REPO:latest \
            .
          docker push $ECR_REPO:$IMAGE_TAG
          docker push $ECR_REPO:latest

      # Las credenciales de este repo no tienen iam:PassRole, así que no se
      # puede registrar task definition nueva (método del repo paartigas).
      # La task def actual apunta a :latest: basta forzar redeploy para tomar
      # la imagen recién pusheada. Rollback: re-tagear :latest a un SHA
      # anterior y volver a forzar redeploy.
      - name: Deploy en ECS (redeploy sobre :latest)
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_SERVICE \
            --force-new-deployment > /dev/null
          echo "Esperando estabilidad del servicio..."
          aws ecs wait services-stable \
            --cluster $ECS_CLUSTER \
            --services $ECS_SERVICE

      - name: ✅ Deploy completado
        run: echo "Deploy exitoso - imagen ${{ github.sha }} corriendo en ${{ env.ECS_CLUSTER }}"
